
# =============================================================================
# dbt_project.yml — NoveoMart dbt project configuration file
# =============================================================================

name: 'dbt_noveomart'       # Must match the profile name in profiles.yml
version: '1.0.0'
config-version: 2
 
# Which connection profile to use (defined in ~/.dbt/profiles.yml)
profile: 'dbt_noveomart'
 
# Where dbt looks for different file types
model-paths:    ["models"]
test-paths:     ["tests"]
macro-paths:    ["macros"]
seed-paths:     ["seeds"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]
 
# dbt build artifacts go here (auto-generated, do not edit)
target-path:    "target"
clean-targets:  ["target", "dbt_packages"]
 
# =============================================================================
# MODEL CONFIGURATION
# Defines how each layer folder is materialised and which schema it writes to.
#
# IMPORTANT: The +schema value here is used by the generate_schema_name macro
# (in macros/generate_schema_name.sql) to write to clean schema names.
#
# Without the macro: schema = target_schema + "_" + custom_schema (messy)
# With the macro:    schema = custom_schema exactly as written below (clean)
# =============================================================================
 
models:
  dbt_noveomart:
 
    # ── Layer 2: Staging ────────────────────────────────────────────────────
    # Purpose: Clean and standardise raw data. One model per source table.
    # No joins. No business logic. Just cleaning.
    # Materialised as VIEW because staging is lightweight — no storage needed.
    2_staging:
      +materialized: view
      +schema: STAGING
 
    # ── Layer 3: Intermediate ───────────────────────────────────────────────
    # Purpose: All reconciliation matching logic lives here.
    # Reads from staging models only — never from raw tables directly.
    # Materialised as VIEW because results flow straight into marts.
    3_intermediate:
      +materialized: view
      +schema: INTERMEDIATE
 
    # ── Layer 4: Marts ──────────────────────────────────────────────────────
    # Purpose: Final output tables. Power BI connects here.
    # No business logic — just selecting and shaping from intermediate.
    # Materialised as TABLE so Power BI queries are fast.
    4_marts:
      +materialized: table
      +schema: MART
 
    # ── Layer 5: Dimensions ─────────────────────────────────────────────────
    # Purpose: Enriched reference tables for Power BI relationships.
    # Materialised as TABLE because they are joined frequently.
    5_dimensions:
      +materialized: table
      +schema: MART
 
# =============================================================================
# Suppress known deprecation warnings in dbt 1.11+
# DuplicateYAMLKeysDeprecation: dbt 1.11 is overly strict about YAML keys
# that appear across different model blocks in the same file.
# The schema.yml files are structurally correct YAML — this is a parser quirk.
# =============================================================================
flags:
  warn_error_options:
    ignore:
      - DuplicateYAMLKeysDeprecation